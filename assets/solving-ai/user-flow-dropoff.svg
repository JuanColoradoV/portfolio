<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 530" font-family="Inter, -apple-system, BlinkMacSystemFont, system-ui, sans-serif">
  <defs>
    <linearGradient id="funnel-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="25%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#60A5FA"/>
      <stop offset="75%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#BFDBFE"/>
    </linearGradient>
    <marker id="arrow" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#CBD5E1"/>
    </marker>
    <filter id="card-shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="530" fill="#FAFAF8"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="#2563EB"/>

  <!-- ===================== HEADER SECTION ===================== -->
  <text x="52" y="42" font-size="11" font-weight="600" fill="#2563EB" letter-spacing="1.5">USER FLOW ANALYSIS</text>
  <text x="52" y="72" font-size="22" font-weight="700" fill="#1A1A1A">AI Workflow &#x2014; Drop-off Points Identified</text>
  <text x="52" y="94" font-size="13" fill="#6B6B6B">Multi-step AI interaction flow with friction points mapped through session analysis and task completion data</text>

  <!-- ===================== FUNNEL BAR ===================== -->
  <rect x="52" y="114" width="1096" height="30" rx="6" fill="url(#funnel-grad)"/>

  <!-- Section marker lines -->
  <line x1="271" y1="114" x2="271" y2="144" stroke="white" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="490" y1="114" x2="490" y2="144" stroke="white" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="710" y1="114" x2="710" y2="144" stroke="white" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="929" y1="114" x2="929" y2="144" stroke="white" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Retention percentage labels on the bar -->
  <text x="68" y="134" font-size="12" font-weight="700" fill="white">100%</text>
  <text x="290" y="134" font-size="12" font-weight="700" fill="white">80%</text>
  <text x="510" y="134" font-size="12" font-weight="600" fill="#1E3A8A">50%</text>
  <text x="730" y="134" font-size="12" font-weight="600" fill="#1E3A8A">30%</text>
  <text x="950" y="134" font-size="12" font-weight="600" fill="#1E40AF">20%</text>

  <!-- Retention context labels -->
  <text x="68" y="160" font-size="10" fill="#6B6B6B">All users enter</text>
  <text x="1136" y="160" font-size="10" fill="#6B6B6B" text-anchor="end">Complete flow</text>

  <!-- ===================== STEP CARDS ROW ===================== -->

  <!-- Step 1: Entry Point -->
  <g filter="url(#card-shadow)">
    <rect x="52" y="180" width="190" height="108" rx="8" fill="white" stroke="#E5E5E3" stroke-width="1"/>
  </g>
  <text x="70" y="204" font-size="11" font-weight="600" fill="#6B6B6B">STEP 1</text>
  <text x="70" y="222" font-size="15" font-weight="600" fill="#1A1A1A">Entry Point</text>
  <text x="70" y="240" font-size="11" fill="#6B6B6B">User opens AI workflow</text>
  <text x="70" y="254" font-size="11" fill="#6B6B6B">module to begin task</text>
  <rect x="70" y="262" width="78" height="20" rx="10" fill="#DCFCE7"/>
  <text x="84" y="276" font-size="11" font-weight="600" fill="#16A34A">100% reach</text>

  <!-- Arrow 1 to 2 -->
  <line x1="242" y1="234" x2="268" y2="234" stroke="#CBD5E1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: AI Type Selection -->
  <g filter="url(#card-shadow)">
    <rect x="272" y="180" width="190" height="108" rx="8" fill="white" stroke="#E5E5E3" stroke-width="1"/>
  </g>
  <text x="290" y="204" font-size="11" font-weight="600" fill="#6B6B6B">STEP 2</text>
  <text x="290" y="222" font-size="15" font-weight="600" fill="#1A1A1A">AI Type Selection</text>
  <text x="290" y="240" font-size="11" fill="#6B6B6B">Choose automation type</text>
  <text x="290" y="254" font-size="11" fill="#6B6B6B">and define scope</text>
  <rect x="290" y="262" width="56" height="20" rx="10" fill="#FEF3C7"/>
  <text x="302" y="276" font-size="11" font-weight="600" fill="#92400E">-20%</text>

  <!-- Arrow 2 to 3 -->
  <line x1="462" y1="234" x2="488" y2="234" stroke="#CBD5E1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Configuration (HIGH FRICTION) -->
  <g filter="url(#card-shadow)">
    <rect x="492" y="180" width="190" height="108" rx="8" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5"/>
  </g>
  <rect x="560" y="172" width="120" height="18" rx="9" fill="#DC2626"/>
  <text x="578" y="185" font-size="9" font-weight="700" fill="white" letter-spacing="0.8">HIGHEST FRICTION</text>
  <text x="510" y="204" font-size="11" font-weight="600" fill="#6B6B6B">STEP 3</text>
  <text x="510" y="222" font-size="15" font-weight="600" fill="#1A1A1A">Configuration</text>
  <text x="510" y="240" font-size="11" fill="#6B6B6B">Set parameters, thresholds</text>
  <text x="510" y="254" font-size="11" fill="#6B6B6B">and input constraints</text>
  <rect x="510" y="262" width="56" height="20" rx="10" fill="#FEE2E2"/>
  <text x="522" y="276" font-size="11" font-weight="700" fill="#DC2626">-30%</text>

  <!-- Arrow 3 to 4 -->
  <line x1="682" y1="234" x2="708" y2="234" stroke="#CBD5E1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: AI Processing -->
  <g filter="url(#card-shadow)">
    <rect x="712" y="180" width="190" height="108" rx="8" fill="white" stroke="#E5E5E3" stroke-width="1"/>
  </g>
  <text x="730" y="204" font-size="11" font-weight="600" fill="#6B6B6B">STEP 4</text>
  <text x="730" y="222" font-size="15" font-weight="600" fill="#1A1A1A">AI Processing</text>
  <text x="730" y="240" font-size="11" fill="#6B6B6B">Wait for AI to generate</text>
  <text x="730" y="254" font-size="11" fill="#6B6B6B">and return results</text>
  <rect x="730" y="262" width="50" height="20" rx="10" fill="#FEF3C7"/>
  <text x="742" y="276" font-size="11" font-weight="600" fill="#92400E">-10%</text>

  <!-- Arrow 4 to 5 -->
  <line x1="902" y1="234" x2="928" y2="234" stroke="#CBD5E1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 5: Interpret Results (HIGH FRICTION) -->
  <g filter="url(#card-shadow)">
    <rect x="932" y="180" width="216" height="108" rx="8" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5"/>
  </g>
  <rect x="1018" y="172" width="128" height="18" rx="9" fill="#DC2626"/>
  <text x="1036" y="185" font-size="9" font-weight="700" fill="white" letter-spacing="0.8">CRITICAL FRICTION</text>
  <text x="950" y="204" font-size="11" font-weight="600" fill="#6B6B6B">STEP 5</text>
  <text x="950" y="222" font-size="15" font-weight="600" fill="#1A1A1A">Interpret Results</text>
  <text x="950" y="240" font-size="11" fill="#6B6B6B">Understand AI output and</text>
  <text x="950" y="254" font-size="11" fill="#6B6B6B">determine next action</text>
  <rect x="950" y="262" width="56" height="20" rx="10" fill="#FEE2E2"/>
  <text x="962" y="276" font-size="11" font-weight="700" fill="#DC2626">-20%</text>

  <!-- ===================== ROOT CAUSE CALLOUTS ===================== -->

  <!-- Dashed line from Step 3 -->
  <line x1="587" y1="288" x2="587" y2="318" stroke="#DC2626" stroke-width="1" stroke-dasharray="3,3" stroke-opacity="0.6"/>
  <circle cx="587" cy="318" r="2.5" fill="#DC2626" fill-opacity="0.6"/>

  <!-- Step 3 Root Cause Box -->
  <rect x="482" y="326" width="210" height="60" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="498" y="346" font-size="11" font-weight="700" fill="#DC2626">Root cause</text>
  <text x="498" y="362" font-size="11" fill="#991B1B">Too many parameters visible.</text>
  <text x="498" y="378" font-size="11" fill="#991B1B">Users don't know what affects what.</text>

  <!-- Dashed line from Step 5 -->
  <line x1="1040" y1="288" x2="1040" y2="318" stroke="#DC2626" stroke-width="1" stroke-dasharray="3,3" stroke-opacity="0.6"/>
  <circle cx="1040" cy="318" r="2.5" fill="#DC2626" fill-opacity="0.6"/>

  <!-- Step 5 Root Cause Box -->
  <rect x="922" y="326" width="226" height="60" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="938" y="346" font-size="11" font-weight="700" fill="#DC2626">Root cause</text>
  <text x="938" y="362" font-size="11" fill="#991B1B">AI output feels like a black box.</text>
  <text x="938" y="378" font-size="11" fill="#991B1B">No confidence indicators.</text>

  <!-- ===================== BOTTOM LEGEND BAR ===================== -->
  <rect x="52" y="414" width="1096" height="46" rx="8" fill="white" stroke="#E5E5E3" stroke-width="1"/>

  <rect x="76" y="431" width="10" height="10" rx="5" fill="#DC2626"/>
  <text x="94" y="441" font-size="12" fill="#6B6B6B">High friction (&gt;20% drop)</text>

  <rect x="290" y="431" width="10" height="10" rx="5" fill="#F59E0B"/>
  <text x="308" y="441" font-size="12" fill="#6B6B6B">Moderate friction (10&#x2013;20%)</text>

  <rect x="510" y="431" width="10" height="10" rx="5" fill="#16A34A"/>
  <text x="528" y="441" font-size="12" fill="#6B6B6B">Low / no friction (&lt;10%)</text>

  <text x="1136" y="441" font-size="11" fill="#999999" text-anchor="end">Source: Session recordings, Maze analytics, task completion data</text>

  <!-- ===================== SUMMARY METRICS ===================== -->
  <rect x="52" y="476" width="1096" height="42" rx="8" fill="white" stroke="#E5E5E3" stroke-width="1"/>

  <text x="76" y="502" font-size="11" font-weight="600" fill="#6B6B6B" letter-spacing="0.5">SUMMARY</text>

  <text x="170" y="502" font-size="12" fill="#1A1A1A"><tspan font-weight="700" fill="#DC2626">80%</tspan> total drop-off across flow</text>

  <line x1="400" y1="484" x2="400" y2="510" stroke="#E5E5E3" stroke-width="1"/>
  <text x="420" y="502" font-size="12" fill="#1A1A1A"><tspan font-weight="700" fill="#DC2626">2</tspan> high-friction steps identified</text>

  <line x1="640" y1="484" x2="640" y2="510" stroke="#E5E5E3" stroke-width="1"/>
  <text x="660" y="502" font-size="12" fill="#1A1A1A"><tspan font-weight="700" fill="#1A1A1A">Step 3</tspan> = highest single drop-off (30%)</text>

  <line x1="920" y1="484" x2="920" y2="510" stroke="#E5E5E3" stroke-width="1"/>
  <text x="940" y="502" font-size="12" fill="#1A1A1A">Only <tspan font-weight="700" fill="#2563EB">1 in 5</tspan> users complete the flow</text>

</svg>